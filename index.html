<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLOCK &amp; BRICKS Prompt Architect</title>
  <style>
    @font-face { font-family: 'Paperlogy'; src: url('fonts/Paperlogy-1Thin.ttf') format('truetype'); font-weight: 100; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Paperlogy'; src: url('fonts/Paperlogy-2ExtraLight.ttf') format('truetype'); font-weight: 200; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Paperlogy'; src: url('fonts/Paperlogy-3Light.ttf') format('truetype'); font-weight: 300; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Paperlogy'; src: url('fonts/Paperlogy-4Regular.ttf') format('truetype'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Paperlogy'; src: url('fonts/Paperlogy-5Medium.ttf') format('truetype'); font-weight: 500; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Paperlogy'; src: url('fonts/Paperlogy-6SemiBold.ttf') format('truetype'); font-weight: 600; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Paperlogy'; src: url('fonts/Paperlogy-7Bold.ttf') format('truetype'); font-weight: 700; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Paperlogy'; src: url('fonts/Paperlogy-8ExtraBold.ttf') format('truetype'); font-weight: 800; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Paperlogy'; src: url('fonts/Paperlogy-9Black.ttf') format('truetype'); font-weight: 900; font-style: normal; font-display: swap; }

    :root {
      /* Neo-Brutalism Theme */
      --background: #E8E4DE;
      --foreground: #000000;
      --card: #FFFFFF;
      --card-foreground: #000000;
      --muted: #D4CFC7;
      --muted-foreground: #5C5C5C;
      --accent: #FF5C00;
      --accent-hover: #E55200;
      --accent-foreground: #FFFFFF;
      --secondary: #F5F0EB;
      --secondary-foreground: #000000;
      --border: #000000;
      --border-hover: #000000;
      --input: #FFFFFF;
      --ring: #FF5C00;
      --destructive: #FF0000;
      --destructive-dim: rgba(255, 0, 0, 0.12);
      --success: #00C853;
      --success-dim: rgba(0, 200, 83, 0.12);
      --accent-dim: rgba(255, 92, 0, 0.08);
      --brutal-blue: #3D5AFE;
      --brutal-yellow: #FFD600;
      --brutal-pink: #FF6090;
      --brutal-green: #00E676;
      --brutal-violet: #AA00FF;
      --tier1: #FF5C00;
      --tier2: #3D5AFE;
      --tier3: #00E676;
      --tier4: #AA00FF;
      --sidebar-width: 260px;
      --header-height: 64px;
      --radius: 0px;
      --radius-md: 0px;
      --radius-lg: 0px;
      --radius-xl: 0px;
      --shadow: 5px 5px 0 #000;
      --shadow-sm: 3px 3px 0 #000;
      --shadow-lg: 7px 7px 0 #000;
      --border-w: 3px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Paperlogy', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--background);
      color: var(--foreground);
      min-height: 100vh;
      overflow: hidden;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }

    /* ── Header ───────────────────────────────────────── */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-height);
      background: var(--brutal-yellow);
      border-bottom: var(--border-w) solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      cursor: pointer;
    }

    .header-logo-icon {
      width: 36px;
      height: 36px;
      border-radius: 0;
      border: var(--border-w) solid var(--border);
      object-fit: cover;
      box-shadow: var(--shadow-sm);
    }

    .header-title {
      font-size: 26px;
      font-weight: 800;
      color: var(--foreground);
      letter-spacing: -0.03em;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── Buttons ──────────────────────────────────────── */
    .btn {
      padding: 9px 18px;
      border-radius: 0;
      border: var(--border-w) solid var(--border);
      background: var(--card);
      color: var(--foreground);
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.08s ease, box-shadow 0.08s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
      user-select: none;
      box-shadow: var(--shadow);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .btn:hover {
      transform: translate(2px, 2px);
      box-shadow: 3px 3px 0 #000;
    }

    .btn:active {
      transform: translate(5px, 5px);
      box-shadow: none;
    }

    .btn:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--border);
      color: #fff;
      font-weight: 800;
      box-shadow: var(--shadow);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translate(2px, 2px);
      box-shadow: 3px 3px 0 #000;
    }

    .btn-sm {
      padding: 5px 12px;
      font-size: 15px;
      font-weight: 700;
      box-shadow: var(--shadow-sm);
    }

    .btn-sm:hover {
      transform: translate(1px, 1px);
      box-shadow: 2px 2px 0 #000;
    }

    .btn.copied {
      border-color: var(--border) !important;
      color: #fff !important;
      background: var(--success) !important;
      box-shadow: var(--shadow-sm) !important;
    }

    /* ── Layout ───────────────────────────────────────── */
    .layout {
      display: flex;
      padding-top: var(--header-height);
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ──────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      height: 100%;
      background: var(--card);
      border-right: var(--border-w) solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .sidebar-section {
      padding: 16px 14px 8px;
    }

    .sidebar-label {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--foreground);
      padding: 0 10px;
      margin-bottom: 8px;
    }

    .brick-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 10px 16px;
    }

    .brick-list::-webkit-scrollbar {
      width: 6px;
    }

    .brick-list::-webkit-scrollbar-track {
      background: var(--muted);
    }

    .brick-list::-webkit-scrollbar-thumb {
      background: var(--border);
    }

    .brick-nav-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: 0;
      cursor: pointer;
      transition: transform 0.08s ease, box-shadow 0.08s ease;
      margin-bottom: 6px;
      border: 2px solid var(--border);
      background: var(--secondary);
      box-shadow: var(--shadow-sm);
    }

    .brick-nav-item:hover {
      background: var(--brutal-yellow);
      transform: translate(1px, 1px);
      box-shadow: 2px 2px 0 #000;
    }

    .brick-nav-item.active {
      background: var(--accent);
      color: #fff;
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 #000;
    }

    .brick-nav-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--foreground);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brick-nav-item:hover .brick-nav-name {
      color: var(--foreground);
    }

    .brick-nav-item.active .brick-nav-name {
      color: #fff;
      font-weight: 800;
    }

    .brick-nav-count {
      font-size: 15px;
      color: var(--foreground);
      padding: 2px 8px;
      border-radius: 0;
      background: var(--card);
      border: 2px solid var(--border);
      flex-shrink: 0;
      font-weight: 700;
    }

    .brick-nav-item.active .brick-nav-count {
      color: var(--foreground);
      background: var(--brutal-yellow);
    }

    /* ── Main ─────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .main-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-bottom: var(--border-w) solid var(--border);
      background: var(--card);
    }

    .toolbar-tab {
      padding: 8px 18px;
      font-size: 15px;
      font-weight: 700;
      border-radius: 0;
      cursor: pointer;
      color: var(--foreground);
      transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.08s ease;
      border: 2px solid var(--border);
      background: var(--secondary);
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      box-shadow: var(--shadow-sm);
    }

    .toolbar-tab:hover {
      background: var(--brutal-yellow);
      transform: translate(1px, 1px);
      box-shadow: 2px 2px 0 #000;
    }

    .toolbar-tab.active {
      background: var(--foreground);
      color: #fff;
      font-weight: 800;
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 #000;
    }

    .toolbar-spacer {
      flex: 1;
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      background: var(--background);
    }

    .main-content::-webkit-scrollbar {
      width: 8px;
    }

    .main-content::-webkit-scrollbar-track {
      background: var(--muted);
    }

    .main-content::-webkit-scrollbar-thumb {
      background: var(--border);
    }

    /* ── Views ─────────────────────────────────────────── */
    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    /* ── JSON Input ────────────────────────────────────── */
    .json-textarea {
      width: 100%;
      min-height: 400px;
      background: var(--card);
      border: var(--border-w) solid var(--border);
      border-radius: 0;
      color: var(--foreground);
      font-family: 'Paperlogy', 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 15px;
      line-height: 1.7;
      padding: 20px;
      resize: vertical;
      outline: none;
      transition: box-shadow 0.1s ease;
      box-shadow: var(--shadow-lg);
    }

    .json-textarea:focus {
      box-shadow: 7px 7px 0 var(--accent);
    }

    .json-textarea::placeholder {
      color: var(--muted-foreground);
      opacity: 0.6;
    }

    .json-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
    }

    .json-status {
      font-size: 15px;
      color: var(--muted-foreground);
      margin-left: 8px;
      font-weight: 700;
    }

    .json-status.success {
      color: var(--success);
    }

    .json-status.error {
      color: var(--destructive);
    }

    .sample-link {
      font-size: 15px;
      color: var(--brutal-blue);
      cursor: pointer;
      margin-left: auto;
      border: none;
      background: none;
      font-family: inherit;
      font-weight: 700;
      transition: color 0.1s ease;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 3px;
    }

    .sample-link:hover {
      color: var(--accent);
    }

    /* ── Bricks Editor ────────────────────────────────── */
    .metadata-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 0;
      padding: 18px 24px;
      background: var(--brutal-yellow);
      border-bottom: var(--border-w) solid var(--border);
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .meta-item-label {
      font-size: 15px;
      font-weight: 800;
      color: var(--foreground);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .meta-item-value {
      font-size: 15px;
      color: var(--foreground);
      background: var(--card);
      border: var(--border-w) solid var(--border);
      border-radius: 0;
      padding: 8px 12px;
      outline: none;
      font-family: inherit;
      font-weight: 500;
      transition: box-shadow 0.1s ease;
      box-shadow: var(--shadow-sm);
    }

    .meta-item-value:focus {
      box-shadow: 3px 3px 0 var(--accent);
    }

    .bricks-grid {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── Block Tabs ───────────────────────────────────── */
    .block-tabs {
      display: flex;
      gap: 0;
      margin: 0;
      padding: 0;
      background: var(--card);
      border-bottom: var(--border-w) solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .block-tab {
      flex: 1;
      padding: 12px 8px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      border: none;
      border-right: 2px solid var(--border);
      border-radius: 0;
      background: var(--card);
      color: var(--foreground);
      cursor: pointer;
      transition: background 0.08s ease;
      text-align: center;
      line-height: 1.3;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .block-tab:last-child {
      border-right: none;
    }

    .block-tab:hover {
      background: var(--brutal-yellow);
    }

    .block-tab.active {
      background: var(--foreground);
      color: #fff;
      font-weight: 800;
    }

    .block-tab-count {
      font-size: 15px;
      color: inherit;
      display: block;
      margin-top: 2px;
      opacity: 0.6;
    }

    .block-panel {
      display: none;
    }

    .block-panel.active {
      display: block;
    }

    .block-panel-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      background: var(--secondary);
      border-bottom: var(--border-w) solid var(--border);
    }

    .block-panel-header .brick-card-id {
      font-size: 15px;
      font-weight: 800;
      padding: 5px 12px;
      border-radius: 0;
      color: #fff;
      border: var(--border-w) solid var(--border);
      box-shadow: var(--shadow-sm);
    }

    .block-panel-header .brick-card-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--foreground);
      flex: 1;
      text-transform: uppercase;
      letter-spacing: -0.01em;
    }

    .block-panel-header .brick-card-count {
      font-size: 15px;
      color: var(--foreground);
      background: var(--brutal-yellow);
      padding: 4px 12px;
      border-radius: 0;
      border: 2px solid var(--border);
      font-weight: 800;
      box-shadow: 2px 2px 0 #000;
    }

    .block-panel-body {
      border: none;
      background: var(--card);
      overflow: hidden;
    }

    .brick-card {
      background: var(--card);
      border: var(--border-w) solid var(--border);
      border-radius: 0;
      overflow: hidden;
      transition: box-shadow 0.1s ease;
      box-shadow: var(--shadow);
    }

    .brick-card:hover {
      box-shadow: var(--shadow-lg);
    }

    .brick-card.highlight {
      box-shadow: 7px 7px 0 var(--accent);
    }

    .brick-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--secondary);
      border-bottom: var(--border-w) solid var(--border);
    }

    .brick-card-id {
      font-size: 15px;
      font-weight: 800;
      padding: 4px 12px;
      border-radius: 0;
      color: #fff;
      text-align: center;
      border: 2px solid var(--border);
    }

    .brick-card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--foreground);
      flex: 1;
    }

    .brick-card-count {
      font-size: 15px;
      color: var(--muted-foreground);
      font-weight: 700;
    }

    /* ── Field Groups ─────────────────────────────────── */
    .brick-field-group {
      padding: 16px 24px;
      border-bottom: 2px solid var(--border);
      transition: background 0.08s ease;
    }

    .brick-field-group:last-child {
      border-bottom: none;
    }

    .brick-field-group:hover {
      background: var(--secondary);
    }

    .brick-field-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .brick-field-name {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      background: var(--foreground);
      padding: 4px 12px;
      border-radius: 0;
      font-family: 'Paperlogy', 'JetBrains Mono', 'SF Mono', monospace;
      letter-spacing: 0.02em;
    }

    .brick-field-name-ko {
      font-size: 15px;
      color: var(--muted-foreground);
      margin-left: 10px;
      font-weight: 600;
    }

    .brick-field-actions {
      display: flex;
      gap: 4px;
    }

    .brick-field-panes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .brick-pane-mini-label {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted-foreground);
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brick-pane-mini-label.en {
      color: var(--accent);
    }

    .brick-pane-mini-label.ko {
      color: var(--brutal-blue);
    }

    .brick-card-textarea {
      width: 100%;
      min-height: 42px;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 0;
      color: var(--foreground);
      font-family: inherit;
      font-size: 15px;
      line-height: 1.7;
      padding: 8px 12px;
      resize: none;
      overflow: hidden;
      outline: none;
      transition: box-shadow 0.1s ease;
      box-shadow: var(--shadow-sm);
    }

    .brick-card-textarea:focus {
      box-shadow: 3px 3px 0 var(--brutal-blue);
    }

    .brick-card-textarea::placeholder {
      color: var(--muted-foreground);
      opacity: 0.5;
    }

    /* ── Output View ──────────────────────────────────── */
    .output-section {
      margin-bottom: 24px;
    }

    .output-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .output-section-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--foreground);
      text-transform: uppercase;
      letter-spacing: -0.01em;
    }

    .output-block {
      background: var(--card);
      border: var(--border-w) solid var(--border);
      border-radius: 0;
      padding: 20px;
      font-size: 15px;
      line-height: 1.7;
      color: var(--foreground);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 500px;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }

    .output-block::-webkit-scrollbar {
      width: 6px;
    }

    .output-block::-webkit-scrollbar-track {
      background: var(--muted);
    }

    .output-block::-webkit-scrollbar-thumb {
      background: var(--border);
    }

    /* ── Toast ─────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 14px 24px;
      border-radius: 0;
      font-size: 15px;
      font-weight: 800;
      font-family: inherit;
      z-index: 200;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success {
      background: var(--brutal-green);
      border: var(--border-w) solid var(--border);
      color: var(--foreground);
      box-shadow: var(--shadow);
    }

    .toast.error {
      background: var(--destructive);
      border: var(--border-w) solid var(--border);
      color: #fff;
      box-shadow: var(--shadow);
    }

    /* ── Empty State ──────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
    }

    .empty-state-icon {
      font-size: 68px;
      margin-bottom: 20px;
      color: var(--foreground);
      opacity: 0.15;
      font-weight: 800;
    }

    .empty-state-text {
      font-size: 15px;
      color: var(--muted-foreground);
      line-height: 1.7;
      font-weight: 500;
    }

    /* ── Sidebar Action Buttons ───────────────────────── */
    .btn-mint {
      display: block;
      width: 100%;
      padding: 12px 0;
      background: var(--brutal-yellow);
      color: var(--foreground);
      font-family: inherit;
      font-size: 15px;
      font-weight: 800;
      text-align: center;
      text-decoration: none;
      border-radius: 0;
      border: var(--border-w) solid var(--border);
      cursor: pointer;
      transition: transform 0.08s ease, box-shadow 0.08s ease;
      box-shadow: var(--shadow);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .btn-mint:hover {
      transform: translate(2px, 2px);
      box-shadow: 3px 3px 0 #000;
    }

    .btn-mint:active {
      transform: translate(5px, 5px);
      box-shadow: none;
    }

    /* ── Mobile Menu Toggle ───────────────────────────── */
    .menu-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--foreground);
      cursor: pointer;
      padding: 4px;
      border-radius: 0;
      transition: background 0.08s ease;
    }

    .menu-toggle:hover {
      background: rgba(0,0,0,0.1);
    }

    /* ── Tier Colors ──────────────────────────────────── */
    .t1 { background: var(--tier1); }
    .t2 { background: var(--tier2); }
    .t3 { background: var(--tier3); }
    .t4 { background: var(--tier4); }

    /* ── Mobile Responsive ────────────────────────────── */
    @media (max-width: 768px) {
      :root {
        --header-height: 56px;
        --sidebar-width: 100%;
        --shadow: 4px 4px 0 #000;
        --shadow-sm: 2px 2px 0 #000;
        --shadow-lg: 5px 5px 0 #000;
      }

      body {
        overflow: auto;
      }

      .header {
        padding: 0 12px;
      }

      .header-title {
        font-size: 18px;
      }

      .header-right .btn span {
        display: none;
      }

      .header-right .btn {
        padding: 8px 12px;
      }

      .menu-toggle {
        display: flex;
      }

      .layout {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
        overflow: auto;
      }

      .sidebar {
        width: 100%;
        min-width: 100%;
        height: auto;
        border-right: none;
        border-bottom: var(--border-w) solid var(--border);
        display: none;
      }

      .sidebar.open {
        display: flex;
      }

      .sidebar-section {
        padding: 12px;
      }

      .brick-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        padding: 0 12px 12px;
        overflow-y: visible;
      }

      .brick-nav-item {
        margin-bottom: 0;
        padding: 6px 10px;
        flex-shrink: 0;
      }

      .main {
        overflow: visible;
      }

      .main-toolbar {
        padding: 8px 12px;
        overflow-x: auto;
        gap: 4px;
      }

      .main-content {
        padding: 0;
      }

      .json-textarea {
        min-height: 250px;
        font-size: 15px;
        padding: 14px;
        box-shadow: var(--shadow);
      }

      .metadata-bar {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 12px;
      }

      .block-tabs {
        gap: 0;
        padding: 0;
      }

      .block-tab {
        padding: 8px 4px;
        font-size: 15px;
      }

      .brick-field-panes {
        grid-template-columns: 1fr;
      }

      .brick-field-group {
        padding: 12px 14px;
      }

      .brick-card-header,
      .block-panel-header {
        flex-wrap: wrap;
        gap: 6px;
        padding: 10px 14px;
      }

      .output-block {
        max-height: 350px;
        font-size: 15px;
        padding: 14px;
        box-shadow: var(--shadow);
      }

      .empty-state {
        padding: 40px 16px;
      }

      .toast {
        left: 12px;
        right: 12px;
        bottom: 12px;
        text-align: center;
      }
    }

    @media (max-width: 480px) {
      .metadata-bar {
        grid-template-columns: 1fr;
      }

      .header-logo-icon {
        width: 28px;
        height: 28px;
      }

      .toolbar-tab {
        font-size: 15px;
        padding: 6px 10px;
        white-space: nowrap;
        box-shadow: 2px 2px 0 #000;
      }
    }
  </style>
</head>

<body>

  <header class="header">
    <div class="header-left">
      <button class="menu-toggle" id="menuToggle" aria-label="메뉴 열기">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M3 6h18M3 12h18M3 18h18"/>
        </svg>
      </button>
      <a class="header-logo" href="javascript:void(0)" id="logoHome">
        <img class="header-logo-icon" src="logo.png" alt="B">
        <div>
          <div class="header-title">BLOCK &amp; BRICK</div>
        </div>
      </a>
    </div>
    <div class="header-right">
      <button class="btn btn-primary" id="btnExportAll" disabled>
        <span>프롬프트 복사</span>
      </button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-section">
        <a href="https://gemini.google.com/gem/1rL_lXc76nS3qBLSgZDgQD4tNeo9k8gYJ?usp=sharing" target="_blank" class="btn-mint">설계하기</a>
      </div>
      <div class="brick-list" id="brickList"></div>
      <div class="sidebar-section" style="padding-top: 8px; border-top: 1px solid var(--border);">
        <a href="https://translate.google.co.kr/?sl=ko&tl=en&op=translate" target="_blank" class="btn-mint" style="background: var(--brutal-green); color: var(--foreground);">Google 번역기</a>
      </div>
    </aside>

    <main class="main">
      <div class="main-toolbar">
        <button class="toolbar-tab active" data-view="json">JSON 입력</button>
        <button class="toolbar-tab" data-view="bricks">블록 편집</button>
        <button class="toolbar-tab" data-view="output">출력 결과</button>
        <div class="toolbar-spacer"></div>
        <button class="btn btn-sm" id="btnReset">초기화</button>
      </div>

      <div class="main-content">
        <!-- JSON Input -->
        <div class="view active" id="viewJson">
          <div class="json-input-area" style="padding: 16px;">
            <textarea class="json-textarea" id="jsonInput" placeholder='Block &amp; Bricks JSON을 여기에 붙여넣으세요...

{
  "metadata": { "title": "...", "target_platform": "...", "aspect_ratio": "16:9" },
  "blocks": {
    "b1_subject": { "archetype": "...", "demographics": "...", ... },
    "b2_environment": { "location": "...", "era": "...", ... },
    "b3_lighting_atmosphere": { "key_light": "...", ... },
    "b4_camera_motion": { "shot_size": "...", ... },
    "b5_render_protocol": { "render_engine": "...", ... }
  },
  "translations": { "archetype": "...", "demographics": "...", ... }
}'></textarea>
            <div class="json-actions">
              <button class="btn btn-primary" id="btnApply">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <polyline points="20 6 9 17 4 12" />
                </svg>
                JSON 적용
              </button>
              <span class="json-status" id="jsonStatus"></span>
            </div>
          </div>
        </div>

        <!-- Bricks Editor -->
        <div class="view" id="viewBricks">
          <div id="bricksEmpty" class="empty-state">
            <div class="empty-state-icon">{ }</div>
            <div class="empty-state-text">아직 불러온 블록이 없습니다.<br>JSON 입력 탭에서 데이터를 붙여넣고 적용하세요.</div>
          </div>
          <div id="bricksContent" style="display:none;">
            <div class="block-tabs" id="blockTabs"></div>
            <div class="bricks-grid" id="bricksGrid"></div>
          </div>
        </div>

        <!-- Output -->
        <div class="view" id="viewOutput">
          <div id="outputEmpty" class="empty-state">
            <div class="empty-state-icon">{ }</div>
            <div class="empty-state-text">아직 출력 결과가 없습니다.<br>블록을 먼저 불러오고 편집하세요.</div>
          </div>
          <div id="outputContent" style="display:none; padding: 16px;">
            <div class="output-section">
              <div class="output-section-header">
                <div class="output-section-title">Structured Text Prompt</div>
                <button class="btn btn-sm" onclick="copyOutput('outputStructured')">복사</button>
              </div>
              <div class="output-block" id="outputStructured"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ── Block Definitions ─────────────────────────────────
    const BLOCK_DEFS = [
      {
        id: 'b1', key: 'b1_subject', name: 'Subject', nameKo: '피사체', tier: 1,
        fields: [
          { key: 'archetype', name: 'Archetype', nameKo: '아키타입' },
          { key: 'demographics', name: 'Demographics', nameKo: '인구통계' },
          { key: 'physique', name: 'Physique', nameKo: '체격' },
          { key: 'wardrobe', name: 'Wardrobe', nameKo: '의상' },
          { key: 'skin_surface', name: 'SkinSurface', nameKo: '표면 질감' },
          { key: 'expression', name: 'Expression', nameKo: '표정' },
          { key: 'gaze_vector', name: 'GazeVector', nameKo: '시선 방향' },
          { key: 'pose', name: 'Pose', nameKo: '포즈' },
          { key: 'target_object', name: 'TargetObject', nameKo: '핵심 오브젝트' },
        ]
      },
      {
        id: 'b2', key: 'b2_environment', name: 'Environment', nameKo: '환경', tier: 2,
        fields: [
          { key: 'location', name: 'Location', nameKo: '장소' },
          { key: 'architecture_style', name: 'ArchitectureStyle', nameKo: '건축 양식' },
          { key: 'era', name: 'Era', nameKo: '시대' },
          { key: 'time_of_day', name: 'TimeOfDay', nameKo: '시간대' },
          { key: 'weather', name: 'Weather', nameKo: '날씨' },
          { key: 'ground_surface', name: 'GroundSurface', nameKo: '지면' },
          { key: 'background_depth', name: 'BackgroundDepth', nameKo: '배경 심도' },
        ]
      },
      {
        id: 'b3', key: 'b3_lighting_atmosphere', name: 'Lighting & Atmosphere', nameKo: '조명 & 분위기', tier: 1,
        fields: [
          { key: 'key_light', name: 'KeyLight', nameKo: '키 라이트' },
          { key: 'fill_light', name: 'FillLight', nameKo: '필 라이트' },
          { key: 'backlight_rim', name: 'BacklightRim', nameKo: '백라이트/림' },
          { key: 'color_temperature', name: 'ColorTemperature', nameKo: '색온도' },
          { key: 'shadow_character', name: 'ShadowCharacter', nameKo: '그림자 특성' },
          { key: 'signature_particles', name: 'SignatureParticles', nameKo: '시그니처 파티클' },
          { key: 'atmospheric_haze', name: 'AtmosphericHaze', nameKo: '대기 헤이즈' },
          { key: 'color_palette', name: 'ColorPalette', nameKo: '색상 팔레트' },
        ]
      },
      {
        id: 'b4', key: 'b4_camera_motion', name: 'Camera & Motion', nameKo: '카메라 & 모션', tier: 3,
        fields: [
          { key: 'shot_size', name: 'ShotSize', nameKo: '샷 사이즈' },
          { key: 'camera_angle', name: 'CameraAngle', nameKo: '카메라 앵글' },
          { key: 'lens_focal_length', name: 'LensFocalLength', nameKo: '렌즈 초점거리' },
          { key: 'aperture_dof', name: 'ApertureDOF', nameKo: '조리개/심도' },
          { key: 'camera_movement', name: 'CameraMovement', nameKo: '카메라 무브먼트' },
          { key: 'subject_dynamics', name: 'SubjectDynamics', nameKo: '피사체 다이나믹스' },
        ]
      },
      {
        id: 'b5', key: 'b5_render_protocol', name: 'Render Protocol', nameKo: '렌더 프로토콜', tier: 4,
        fields: [
          { key: 'render_engine', name: 'RenderEngine', nameKo: '렌더 엔진' },
          { key: 'medium_style', name: 'MediumStyle', nameKo: '매체 스타일' },
          { key: 'imperfection_injector', name: 'ImperfectionInjector', nameKo: '불완전 요소' },
          { key: 'contrast_subject', name: 'ContrastSubject', nameKo: '대비 요소' },
          { key: 'exclusion', name: 'Exclusion', nameKo: '제외 영역' },
        ]
      },
    ];

    let state = {
      metadata: {},
      blocks: {},        // { b1_subject: { archetype: '...', ... }, ... }
      translations: {},  // flat: { archetype: '...', demographics: '...', ... }
      loaded: false,
    };

    function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    let activeBlockKey = BLOCK_DEFS[0].key;

    function switchBlock(blockKey) {
      activeBlockKey = blockKey;
      // Update block tabs
      document.querySelectorAll('.block-tab').forEach(t => t.classList.toggle('active', t.dataset.block === blockKey));
      // Update panels
      document.querySelectorAll('.block-panel').forEach(p => p.classList.toggle('active', p.dataset.block === blockKey));
      // Update sidebar
      document.querySelectorAll('.brick-nav-item').forEach((n, i) => n.classList.toggle('active', BLOCK_DEFS[i].key === blockKey));
      // Auto-resize textareas in the active panel
      const activePanel = document.querySelector(`.block-panel[data-block="${blockKey}"]`);
      if (activePanel) {
        activePanel.querySelectorAll('.brick-card-textarea').forEach(ta => autoResize(ta));
      }
    }

    // ── Sidebar ──────────────────────────────────────────
    function renderSidebar() {
      const list = document.getElementById('brickList');
      list.innerHTML = '';
      BLOCK_DEFS.forEach(block => {
        const el = document.createElement('div');
        el.className = 'brick-nav-item' + (block.key === activeBlockKey ? ' active' : '');
        const filled = state.loaded ? block.fields.filter(f => (state.blocks[block.key]?.[f.key] || '').trim()).length : 0;
        const isIncomplete = filled < block.fields.length;
        el.innerHTML = `
          <div class="brick-nav-name">${block.nameKo}</div>
          ${state.loaded ? `<span class="brick-nav-count"><span style="color:${isIncomplete ? 'var(--destructive)' : 'var(--success)'};font-weight:600">${filled}</span>/${block.fields.length}</span>` : ''}
        `;
        el.addEventListener('click', () => {
          switchView('bricks');
          if (state.loaded) switchBlock(block.key);
        });
        list.appendChild(el);
      });
    }

    // ── View Switch ──────────────────────────────────────
    function switchView(name) {
      document.querySelectorAll('.toolbar-tab').forEach(t => t.classList.toggle('active', t.dataset.view === name));
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('view' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
      if (name === 'output' && state.loaded) generateOutput();
    }
    document.querySelectorAll('.toolbar-tab').forEach(tab => {
      tab.addEventListener('click', () => switchView(tab.dataset.view));
    });

    // ── JSON Apply ───────────────────────────────────────
    document.getElementById('btnApply').addEventListener('click', applyJson);

    function applyJson() {
      const raw = document.getElementById('jsonInput').value.trim();
      const st = document.getElementById('jsonStatus');
      if (!raw) { st.className = 'json-status error'; st.textContent = 'JSON 데이터를 먼저 붙여넣으세요.'; return; }
      let data;
      try { data = JSON.parse(raw); } catch (e) { st.className = 'json-status error'; st.textContent = 'JSON 파싱 오류: ' + e.message; return; }

      // Metadata
      if (data.metadata) {
        state.metadata = { ...data.metadata };
      }

      // Blocks
      if (data.blocks) {
        state.blocks = {};
        BLOCK_DEFS.forEach(block => {
          state.blocks[block.key] = {};
          const src = data.blocks[block.key] || {};
          block.fields.forEach(field => {
            state.blocks[block.key][field.key] = src[field.key] || '';
          });
        });
      }

      // Translations (flat)
      state.translations = {};
      if (data.translations) {
        BLOCK_DEFS.forEach(block => {
          block.fields.forEach(field => {
            state.translations[field.key] = data.translations[field.key] || '';
          });
        });
      }

      state.loaded = true;
      renderSidebar();
      renderBricksEditor();
      renderOutput();

      let fieldCount = 0;
      BLOCK_DEFS.forEach(block => {
        block.fields.forEach(field => {
          if ((state.blocks[block.key]?.[field.key] || '').trim()) fieldCount++;
        });
      });
      st.className = 'json-status success';
      st.textContent = `파싱 완료. ${BLOCK_DEFS.length}개 블록, ${fieldCount}개 필드 로드됨.`;
      document.getElementById('btnExportAll').disabled = false;
      showToast('JSON이 적용되었습니다', 'success');
      // 블록 편집 탭 버튼을 직접 클릭
      const bricksTab = document.querySelector('.toolbar-tab[data-view="bricks"]');
      if (bricksTab) bricksTab.click();
    }

    // ── Bricks Editor ────────────────────────────────────
    function renderBricksEditor() {
      if (!state.loaded) return;
      document.getElementById('bricksEmpty').style.display = 'none';
      document.getElementById('bricksContent').style.display = 'block';


      // Block tabs
      const tabsContainer = document.getElementById('blockTabs');
      tabsContainer.innerHTML = '';
      BLOCK_DEFS.forEach(block => {
        const filled = block.fields.filter(f => (state.blocks[block.key]?.[f.key] || '').trim()).length;
        const tab = document.createElement('button');
        tab.className = 'block-tab' + (block.key === activeBlockKey ? ' active' : '');
        tab.dataset.block = block.key;
        tab.textContent = block.nameKo;
        tab.addEventListener('click', () => switchBlock(block.key));
        tabsContainer.appendChild(tab);
      });

      // Block panels
      const grid = document.getElementById('bricksGrid');
      grid.innerHTML = '';

      BLOCK_DEFS.forEach(block => {
        const panel = document.createElement('div');
        panel.className = 'block-panel' + (block.key === activeBlockKey ? ' active' : '');
        panel.dataset.block = block.key;

        const filled = block.fields.filter(f => (state.blocks[block.key]?.[f.key] || '').trim()).length;

        // Panel header
        const header = document.createElement('div');
        header.className = 'block-panel-header';
        header.innerHTML = `
          <span class="brick-card-id t${block.tier}">${block.id.toUpperCase()}</span>
          <span class="brick-card-title">${block.nameKo} &mdash; ${block.name}</span>
          <span class="brick-card-count">${filled}/${block.fields.length}</span>
        `;
        panel.appendChild(header);

        // Panel body
        const body = document.createElement('div');
        body.className = 'block-panel-body';

        block.fields.forEach(field => {
          const enRaw = (state.blocks[block.key]?.[field.key] || '').trim();
          const koRaw = (state.translations[field.key] || '').trim();

          // 둘 다 비어있으면 숨김
          if (!enRaw && !koRaw) return;

          const group = document.createElement('div');
          group.className = 'brick-field-group';

          const enVal = escHtml(enRaw);
          const koVal = escHtml(koRaw);

          group.innerHTML = `
            <div class="brick-field-header">
              <div>
                <span class="brick-field-name">${field.key}</span>
                <span class="brick-field-name-ko">${field.nameKo}</span>
              </div>
            </div>
            <div class="brick-field-panes">
              <div>
                <div class="brick-pane-mini-label ko">한국어 <div style="display:flex;gap:4px;"><button class="btn btn-sm" data-paste-field-ko="${field.key}">붙여넣기</button><button class="btn btn-sm" data-copy-field-ko="${field.key}">복사</button></div></div>
                <textarea rows="1" class="brick-card-textarea" data-trans="${field.key}" placeholder="한국어...">${koVal}</textarea>
              </div>
              <div>
                <div class="brick-pane-mini-label en">ENGLISH <div style="display:flex;gap:4px;"><button class="btn btn-sm" data-paste-field-en="${block.key}.${field.key}">붙여넣기</button><button class="btn btn-sm" data-copy-field-en="${block.key}.${field.key}">복사</button></div></div>
                <textarea rows="1" class="brick-card-textarea" data-block="${block.key}" data-field="${field.key}" placeholder="English...">${enVal}</textarea>
              </div>
            </div>
          `;
          body.appendChild(group);
        });

        panel.appendChild(body);
        grid.appendChild(panel);
      });

      // EN textarea events
      grid.querySelectorAll('[data-block][data-field]').forEach(ta => {
        autoResize(ta);
        ta.addEventListener('input', () => {
          state.blocks[ta.dataset.block][ta.dataset.field] = ta.value;
          updateBlockTabCount(ta.dataset.block);
          renderSidebar();
          autoResize(ta);
        });
      });

      // KO textarea events
      grid.querySelectorAll('[data-trans]').forEach(ta => {
        autoResize(ta);
        ta.addEventListener('input', () => {
          state.translations[ta.dataset.trans] = ta.value;
          autoResize(ta);
        });
      });

      // Copy EN
      grid.querySelectorAll('[data-copy-field-en]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const [blockKey, fieldKey] = btn.dataset.copyFieldEn.split('.');
          const val = state.blocks[blockKey]?.[fieldKey] || '';
          navigator.clipboard.writeText(val).then(() => flashCopied(btn));
        });
      });

      // Copy KO
      grid.querySelectorAll('[data-copy-field-ko]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const val = state.translations[btn.dataset.copyFieldKo] || '';
          navigator.clipboard.writeText(val).then(() => flashCopied(btn));
        });
      });

      // Paste KO
      grid.querySelectorAll('[data-paste-field-ko]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const fieldKey = btn.dataset.pasteFieldKo;
          navigator.clipboard.readText().then(text => {
            state.translations[fieldKey] = text;
            const ta = grid.querySelector(`textarea[data-trans="${fieldKey}"]`);
            if (ta) { ta.value = text; autoResize(ta); }
            flashCopied(btn);
          });
        });
      });

      // Paste EN
      grid.querySelectorAll('[data-paste-field-en]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const [blockKey, fieldKey] = btn.dataset.pasteFieldEn.split('.');
          navigator.clipboard.readText().then(text => {
            state.blocks[blockKey][fieldKey] = text;
            const ta = grid.querySelector(`textarea[data-block="${blockKey}"][data-field="${fieldKey}"]`);
            if (ta) { ta.value = text; autoResize(ta); }
            updateBlockTabCount(blockKey);
            renderSidebar();
            flashCopied(btn);
          });
        });
      });
    }

    function updateBlockTabCount(blockKey) {
      const block = BLOCK_DEFS.find(b => b.key === blockKey);
      if (!block) return;
      const filled = block.fields.filter(f => (state.blocks[block.key]?.[f.key] || '').trim()).length;
      const tab = document.querySelector(`.block-tab[data-block="${blockKey}"]`);
      if (tab) {
        const countEl = tab.querySelector('.block-tab-count');
        if (countEl) countEl.textContent = `${filled}/${block.fields.length}`;
      }
      const header = document.querySelector(`.block-panel[data-block="${blockKey}"] .brick-card-count`);
      if (header) header.textContent = `${filled}/${block.fields.length}`;
    }

    function flashCopied(btn) {
      btn.classList.add('copied');
      const orig = btn.textContent;
      btn.textContent = 'OK';
      setTimeout(() => { btn.classList.remove('copied'); btn.textContent = orig; }, 1500);
    }

    function autoResize(ta) {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 4 + 'px';
    }

    // ── Output ───────────────────────────────────────────
    function generateOutput() {
      if (!state.loaded) return;
      document.getElementById('outputEmpty').style.display = 'none';
      document.getElementById('outputContent').style.display = 'block';
      renderOutput();
    }

    function renderOutput() {
      if (!state.loaded) return;

      // Structured Text — (FieldName: value) per line
      let lines = [];
      BLOCK_DEFS.forEach(block => {
        block.fields.forEach(field => {
          const val = (state.blocks[block.key]?.[field.key] || '').trim();
          if (val && !val.startsWith('N/A')) {
            lines.push(`(${field.name}: ${val})`);
          }
        });
      });
      document.getElementById('outputStructured').textContent = lines.join(' ');

      // JSON Export
      const exportData = {
        metadata: { ...state.metadata },
        blocks: {},
        translations: {},
      };
      BLOCK_DEFS.forEach(block => {
        exportData.blocks[block.key] = {};
        block.fields.forEach(field => {
          const val = (state.blocks[block.key]?.[field.key] || '').trim();
          if (val) exportData.blocks[block.key][field.key] = val;
          const tr = (state.translations[field.key] || '').trim();
          if (tr) exportData.translations[field.key] = tr;
        });
      });
      const outputJsonEl = document.getElementById('outputJson');
      if (outputJsonEl) outputJsonEl.textContent = JSON.stringify(exportData, null, 2);
    }

    function copyOutput(id) {
      navigator.clipboard.writeText(document.getElementById(id).textContent).then(() => showToast('클립보드에 복사되었습니다', 'success'));
    }

    document.getElementById('btnExportAll').addEventListener('click', () => {
      if (!state.loaded) return;
      generateOutput();
      const full = document.getElementById('outputStructured').textContent;
      navigator.clipboard.writeText(full).then(() => showToast('전체 프롬프트가 클립보드에 복사되었습니다', 'success'));
    });

    document.getElementById('btnReset').addEventListener('click', () => {
      if (!confirm('모든 데이터를 초기화할까요?')) return;
      state = { metadata: {}, blocks: {}, translations: {}, loaded: false };
      document.getElementById('jsonInput').value = '';
      document.getElementById('jsonStatus').textContent = '';
      document.getElementById('bricksEmpty').style.display = '';
      document.getElementById('bricksContent').style.display = 'none';
      document.getElementById('outputEmpty').style.display = '';
      document.getElementById('outputContent').style.display = 'none';
      document.getElementById('btnExportAll').disabled = true;
      renderSidebar(); switchView('json');
      showToast('초기화 완료', 'success');
    });
